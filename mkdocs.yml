site_name: 工业与机器视觉100问
site_url: https://lanqingsong.github.io/industrial-machine-vision-100-questions/
repo_url: https://github.com/Lanqingsong/industrial-machine-vision-100-questions
repo_name: Lanqingsong/industrial-machine-vision-100-questions
site_author: LanQS
site_description: 工业与机器视觉100问公开阅读版，第1—60问全文，第61—100问目录
copyright: Copyright © 2026 LanQS / 兰青松 · 辽作登字-2026-L-00055599
use_directory_urls: false

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    primary: blue grey
    accent: teal

nav:
  - 首页: index.md
  - 第一部分：相机、镜头与成像硬件（1—31）: part1-1-31.md
  - 第二部分：算法基础（32—40）: part2-32-40.md
  - 第三部分：PLC通信与系统集成（连载至60）: part3-41-60.md
  - 第61—100问目录: catalog-61-100.md
  - 版权与AI说明: copyright.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
