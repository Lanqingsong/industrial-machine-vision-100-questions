site_name: 工业与机器视觉100问
site_url: https://lanqingsong.github.io/industrial-machine-vision-100-questions/
repo_url: https://github.com/Lanqingsong/industrial-machine-vision-100-questions
repo_name: Lanqingsong/industrial-machine-vision-100-questions
site_author: LanQS
site_description: 工业与机器视觉100问公开阅读版，第1—60问全文，第61—100问目录
copyright: Copyright © 2026 LanQS / 兰青松 · 辽作登字-2026-L-00055599
use_directory_urls: false

theme:
  name: material
  language: zh
  icon:
    logo: material/book-open-page-variant
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: blue grey
    accent: amber

nav:
  - 开始阅读:
      - 图书首页: index.md
      - 前言: preface.md
      - 阅读指南: reading-guide.md
      - 全书目录: full-catalog.md
  - 第一部分 · 成像硬件:
      - 第一部分导读: part1-index.md
      - 1. 工业相机选型（1—6）: part1-camera-1-6.md
      - 2. 镜头与成像（7—14）: part1-lens-7-14.md
      - 3. 工业照明（15—22）: part1-lighting-15-22.md
      - 4. 三维与特殊成像（23—31）: part1-advanced-23-31.md
  - 第二部分 · 算法基础:
      - 第二部分导读: part2-index.md
      - 5. 算法基础（32—40）: part2-algorithms-32-40.md
  - 第三部分 · 系统集成:
      - 第三部分导读: part3-index.md
      - 6. PLC、I/O与通信（41—50）: part3-plc-41-50.md
      - 7. 运动控制与同步（51—57）: part3-motion-51-57.md
      - 8. HMI与生产换型（58—60）: part3-hmi-58-60.md
  - 后续内容:
      - 第61—100问目录: catalog-61-100.md
      - 版权与AI说明: copyright.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
